<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Academia Olimpus</title>
  <link rel="icon" type="image/svg+xml" href="imagens/logo-olimpus.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', sans-serif;
      background: #FFFFFF;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .wrap { max-width: 520px; }
    img { width: 72px; margin: 0 auto 2rem; display: block; }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(4rem, 14vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    h1 span { color: #F4C41F; }
    p { color: #6b7280; font-size: 1.05rem; margin-bottom: 2.5rem; line-height: 1.6; }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #F4C41F;
      color: #111111;
      padding: 1rem 2.4rem;
      border-radius: 999px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.9rem;
      text-decoration: none;
      box-shadow: 0 12px 32px rgba(244, 196, 31, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    a.btn:focus-visible { outline: 3px solid #D9A800; outline-offset: 3px; }
    a.btn:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(244, 196, 31, 0.4); }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="imagens/logo-olimpus.svg" alt="Academia Olimpus" width="72" height="72">
    <h1>4<span>0</span>4</h1>
    <p>A página que você procura não existe ou foi movida.<br>Volte para a página inicial e continue sua jornada na Olimpus.</p>
    <a class="btn" href="/">← Voltar ao site</a>
  </div>
</body>
</html>
